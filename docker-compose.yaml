services:
  redis:
    image: redis:8-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PWD} --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PWD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - crispylab
    env_file:
      - .env

  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${CMS_DB_USERNAME}
      POSTGRES_PASSWORD: ${CMS_DB_PASSWORD}
      POSTGRES_DB: ${CMS_DB_NAME}
      TZ: UTC
    ports:
      - "5432:5432"
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CMS_DB_USERNAME} -d ${CMS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crispylab
    env_file:
      - .env

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PWD}
      HTTP_USER: ${REDIS_WEB_USER}
      HTTP_PASSWORD: ${REDIS_WEB_PWD}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - crispylab
    env_file:
      - .env

  pgweb:
    image: sosedoff/pgweb:latest
    restart: always
    ports:
      - "8082:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://${CMS_DB_USERNAME}:${CMS_DB_PASSWORD}@postgres:5432/${CMS_DB_NAME}?sslmode=disable
    depends_on:
      - postgres
    networks:
      - crispylab
    env_file:
      - .env

networks:
  crispylab: